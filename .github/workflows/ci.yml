name: CI

on:
  push:
    branches: ["dev", "main"]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pyspark-version: ["3.5.5", "4.0.0", "4.1.0"]
      fail-fast: false

    name: Test (PySpark ${{ matrix.pyspark-version }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-pyspark${{ matrix.pyspark-version }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Override PySpark version
        run: poetry run pip install "pyspark==${{ matrix.pyspark-version }}"

      - name: Run tests
        run: poetry run pytest -q
